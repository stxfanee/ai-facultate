# Place the map in the nginx http {} block. The two server blocks may be
# included from conf.d. TLS is terminated by Cloudflare/Tailscale in this setup.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
limit_req_zone $binary_remote_addr zone=copilot_per_ip:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=copilot_connections:10m;

server {
    listen 127.0.0.1:8080;
    server_name study.example.com;
    client_max_body_size 100m;

    location / {
        limit_req zone=copilot_per_ip burst=20 nodelay;
        limit_conn copilot_connections 10;
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name api.study.example.com;
    client_max_body_size 100m;

    location / {
        limit_req zone=copilot_per_ip burst=20 nodelay;
        limit_conn copilot_connections 10;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
